# * this method should use python -m to make sure the hydra config is loaded correctly
# hydra config
hydra:
  run:
    dir: ${log_path}
  job:
    chdir: false

# Path
paths:
  sam3d_body_results_path: /workspace/data/sam3d_body_results/person
  vggt_results_path: /workspace/data/vggt_npy/${infer.view} # 这是 vggt 的 npy 输出路径
  video_path: /workspace/data/side_raw # this is raw data path, with left and right side view.
  inference_output_path: /workspace/data/fuse/${infer.view}

log_path: logs/fuse/${infer.view}/${now:%Y-%m-%d}/${now:%H-%M-%S}

visualize:
  save_video: true
  plot_3d: true
  plot_2d: true
  plot_skeleton: true
  plot_skeleton_3d: true

infer:
  gpu: 1
  hflip: true
  view: "single" # "single" or "dual"

runtime:
  verbose: true
  num_workers: 4
  debug: false

dataset:
  recursive: false
